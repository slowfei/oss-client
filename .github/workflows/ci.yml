name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-root:
    name: unit root (${{ matrix.os }} / go ${{ matrix.go }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ['1.22', '1.23']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - run: go test -race -count=1 -short ./...

  unit-testkit:
    name: unit testkit (${{ matrix.os }} / go ${{ matrix.go }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ['1.25']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - run: go test -race -count=1 -short ./...
        working-directory: pkg/testkit/contract

  vet-fmt:
    name: vet + gofmt (root + testkit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: vet root
        run: go vet ./...
      - name: gofmt root
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "::error::root files need gofmt:"
            echo "$out"
            exit 1
          fi
      - name: vet testkit
        run: go vet ./...
        working-directory: pkg/testkit/contract
      - name: gofmt testkit
        working-directory: pkg/testkit/contract
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "::error::testkit files need gofmt:"
            echo "$out"
            exit 1
          fi

  unit-docker:
    name: unit (docker contract suite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go test -count=1 -tags=docker ./...
        working-directory: pkg/testkit/contract

  surface:
    name: frozen surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go test ./pkg/uos -run TestFrozenSurface -count=1 -v
